<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sponsor Thumbnail V1 — Navy</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 800px; height: 418px; overflow: hidden; background: #223042; }
    .card {
      width: 800px; height: 418px;
      background: #223042;
      display: flex; flex-direction: column;
      justify-content: center;
      padding: 48px 64px;
      position: relative; overflow: hidden;
      font-family: 'Inter', sans-serif;
    }
    .net {
      position: absolute; right: 0; top: 0;
      width: 466px; height: 418px;
      opacity: 0.07; pointer-events: none;
    }
    .overline {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.18em; color: #00BFA5;
      text-transform: uppercase; margin-bottom: 16px;
    }
    .question {
      font-size: 42px; font-weight: 900;
      line-height: 1.08; color: #FFFFFF;
      letter-spacing: -0.03em; margin-bottom: 8px;
      max-width: 520px;
    }
    .question em {
      color: #00BFA5; font-style: normal;
    }
    .sub {
      font-size: 13px; font-weight: 500;
      color: rgba(255,255,255,0.5);
      margin-bottom: 32px;
      letter-spacing: 0.01em;
    }
    .cta {
      display: inline-block;
      background: #FF5F5F; color: #fff;
      font-size: 13px; font-weight: 700;
      padding: 12px 26px; border-radius: 6px;
      letter-spacing: 0.01em;
      width: fit-content;
    }
    .logo {
      position: absolute; bottom: 32px; right: 48px;
      text-align: right;
    }
    .logo-name {
      font-size: 14px; font-weight: 900;
      color: #fff; letter-spacing: -0.02em;
    }
    .logo-detail {
      font-size: 10px; font-weight: 500;
      color: #00BFA5; margin-top: 3px;
    }
  </style>
</head>
<body>
  <div class="card">
    <svg class="net" viewBox="0 0 466 418" fill="none">
      <line x1="700" y1="0" x2="200" y2="627" stroke="#00BFA5" stroke-width="1.5"/>
      <line x1="540" y1="0" x2="40" y2="627" stroke="#00BFA5" stroke-width="1.5"/>
      <line x1="380" y1="0" x2="0" y2="480" stroke="#00BFA5" stroke-width="1.5"/>
      <circle cx="540" cy="157" r="5" fill="#00BFA5"/>
      <circle cx="380" cy="313" r="5" fill="#00BFA5"/>
      <circle cx="280" cy="470" r="3.5" fill="#00BFA5"/>
    </svg>
    <div class="overline">ValuSignal 2026 · Sept 18–19 · Virtual</div>
    <div class="question">Want to be a <em>founding sponsor</em> at ValuSignal 2026?</div>
    <div class="sub">80+ Speakers · Fannie Mae · The Appraisal Foundation · All 50 States</div>
    <div class="cta">See Sponsor Packages →</div>
    <div class="logo">
      <div class="logo-name">ValuSignal 2026</div>
      <div class="logo-detail">valusignal.com/sponsor</div>
    </div>
  </div>
</body>
</html>
