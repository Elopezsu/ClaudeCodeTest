<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Resilience Score V2 — Teal Challenge</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 800px; height: 418px; overflow: hidden; background: #00BFA5; }
    .card {
      width: 800px; height: 418px;
      background: #00BFA5;
      display: flex; flex-direction: column;
      justify-content: center;
      padding: 48px 64px;
      position: relative; overflow: hidden;
      font-family: 'Inter', sans-serif;
    }
    .net {
      position: absolute; right: 0; top: 0;
      width: 400px; height: 418px;
      opacity: 0.1; pointer-events: none;
    }

    /* Score badge — floating right */
    .score-badge {
      position: absolute; right: 68px; top: 50%;
      transform: translateY(-50%);
      width: 140px;
      display: flex; flex-direction: column; align-items: center;
    }
    .badge-ring {
      width: 130px; height: 130px;
      border-radius: 50%;
      background: rgba(21,30,41,0.12);
      border: 3px solid rgba(21,30,41,0.2);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      margin-bottom: 10px;
    }
    .badge-num {
      font-size: 48px; font-weight: 900;
      color: #151E29; letter-spacing: -0.05em;
      line-height: 1;
    }
    .badge-denom {
      font-size: 11px; font-weight: 600;
      color: #151E29; opacity: 0.4;
    }
    .badge-label {
      font-size: 9px; font-weight: 700;
      color: #151E29; opacity: 0.5;
      text-transform: uppercase; letter-spacing: 0.1em;
      text-align: center;
    }

    .overline {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.18em; color: #151E29;
      text-transform: uppercase; margin-bottom: 14px;
      opacity: 0.55;
    }
    .challenge {
      font-size: 18px; font-weight: 700;
      color: #151E29; opacity: 0.65;
      margin-bottom: 6px; letter-spacing: -0.01em;
      max-width: 440px;
    }
    .headline {
      font-size: 42px; font-weight: 900;
      line-height: 1.06; color: #151E29;
      letter-spacing: -0.03em; margin-bottom: 14px;
      max-width: 450px;
    }
    .rule {
      width: 32px; height: 3px;
      background: #151E29; opacity: 0.25;
      border-radius: 2px; margin-bottom: 14px;
    }
    .sub {
      font-size: 13px; font-weight: 500;
      color: #151E29; opacity: 0.5;
      margin-bottom: 28px; line-height: 1.5;
      max-width: 420px;
    }
    .cta {
      display: inline-block;
      background: #223042; color: #FFFFFF;
      font-size: 13px; font-weight: 700;
      padding: 12px 26px; border-radius: 6px;
      letter-spacing: 0.01em; width: fit-content;
    }
    .logo {
      position: absolute; bottom: 30px; left: 64px;
    }
    .logo-name {
      font-size: 11px; font-weight: 600;
      color: #151E29; opacity: 0.3; letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="card">
    <svg class="net" viewBox="0 0 400 418" fill="none">
      <line x1="400" y1="0" x2="100" y2="418" stroke="#151E29" stroke-width="1.5"/>
      <line x1="280" y1="0" x2="0" y2="360" stroke="#151E29" stroke-width="1.5"/>
      <circle cx="280" cy="104" r="4" fill="#151E29"/>
      <circle cx="210" cy="209" r="4" fill="#151E29"/>
      <circle cx="160" cy="314" r="3" fill="#151E29"/>
    </svg>

    <div class="score-badge">
      <div class="badge-ring">
        <div class="badge-num">?</div>
        <div class="badge-denom">/ 100</div>
      </div>
      <div class="badge-label">Your Health Score</div>
    </div>

    <div class="overline">Free Assessment &nbsp;·&nbsp; 5 Min</div>
    <div class="challenge">Most appraisal firms can't answer this:</div>
    <div class="headline">How resilient is your business, really?</div>
    <div class="rule"></div>
    <div class="sub">5 categories. Honest self-assessment. Composite Health Score + printable dashboard for your team.</div>
    <div class="cta">Find Out Now →</div>
    <div class="logo">
      <div class="logo-name">appraisal-resilience-score.lovable.app</div>
    </div>
  </div>
</body>
</html>
