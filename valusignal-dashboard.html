<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ValuSignal 2026 – Agenda Dashboard</title>
<style>
:root {
  --bg: #f1f5f9; --surface: #ffffff; --surface2: #e2e8f0;
  --text: #0f172a; --muted: #475569; --dim: #94a3b8;
  --accent: #4f46e5;
  --green-bg:#f0fdf4; --green-border:#86efac; --green-text:#166534;
  --orange-bg:#fff7ed; --orange-border:#fed7aa; --orange-text:#9a3412;
  --red-bg:#fef2f2; --red-border:#fca5a5; --red-text:#991b1b;
  --purple-bg:#faf5ff; --purple-border:#d8b4fe; --purple-text:#6b21a8;
  --slate-bg:#f8fafc; --slate-border:#cbd5e1; --slate-text:#64748b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
.header{background:linear-gradient(135deg,#4f46e5 0%,#3730a3 100%);border-bottom:1px solid #3730a3;padding:20px 24px;position:sticky;top:0;z-index:100}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.header h1{font-size:20px;font-weight:800;color:#fff;line-height:1.2}
.header h1 .accent{color:#c7d2fe}
.header-sub{color:#c7d2fe;font-size:12px;margin-top:3px}
.last-updated{font-size:11px;color:#a5b4fc;text-align:right;white-space:nowrap}
.day-tabs{display:flex;gap:8px;margin-bottom:12px}
.day-tab{padding:7px 18px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);transition:all .2s}
.day-tab:hover{border-color:rgba(255,255,255,.6);color:#fff}
.day-tab.active{background:#fff;border-color:#fff;color:#4f46e5}
.stats-bar{display:flex;gap:8px;flex-wrap:wrap}
.stat-chip{display:flex;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700}
.stat-chip .dot{width:7px;height:7px;border-radius:50%}
.s-confirmed{background:#dcfce7;color:#15803d}.s-confirmed .dot{background:#16a34a}
.s-unconfirmed{background:#fff7ed;color:#c2410c}.s-unconfirmed .dot{background:#ea580c}
.s-empty{background:#fef2f2;color:#b91c1c}.s-empty .dot{background:#dc2626}
.s-comp{background:#e0e7ff;color:#3730a3}.s-comp .dot{background:#6366f1}
.s-issue{background:#faf5ff;color:#6d28d9}.s-issue .dot{background:#7c3aed}

/* FILTER */
.filter-bar{padding:10px 24px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;gap:6px;flex-wrap:wrap;align-items:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.fl{font-size:11px;color:#94a3b8;font-weight:700;margin-right:4px;text-transform:uppercase;letter-spacing:.5px}
.filter-btn{padding:4px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #e2e8f0;background:#f8fafc;color:#64748b;transition:all .15s}
.filter-btn:hover{border-color:#4f46e5;color:#4f46e5;background:#eef2ff}
.filter-btn.active{background:#4f46e5;border-color:#4f46e5;color:#fff}

/* CONTENT */
.content{padding:14px 24px}

/* COMP BANNER */
.comp-banner{background:linear-gradient(90deg,#eef2ff,#e0e7ff);border:1px solid #c7d2fe;border-left:4px solid #6366f1;border-radius:10px;padding:10px 16px;margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.comp-banner-lbl{font-size:10px;font-weight:800;color:#4f46e5;text-transform:uppercase;letter-spacing:.8px;white-space:nowrap}
.comp-pill{display:inline-flex;align-items:center;gap:5px;background:#fff;border:1px solid #c7d2fe;border-radius:6px;padding:3px 9px;font-size:11px;color:#4338ca}
.comp-pill .ct{color:#818cf8;font-size:10px}

/* TRACK */
.track-section{margin-bottom:16px;background:#fff;border-radius:12px;overflow:hidden;border:1px solid #e2e8f0;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.track-header{padding:11px 14px;background:#f8fafc;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;border-bottom:1px solid #e2e8f0;gap:8px}
.track-header:hover{background:#eef2ff}
.track-name{font-size:13px;font-weight:800;color:#1e293b;display:flex;align-items:center;gap:7px}
.track-icon{font-size:14px}
.track-meta{display:flex;align-items:center;gap:6px}
.mb{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:800}
.mb-confirmed{background:#dcfce7;color:#166534}
.mb-unconfirmed{background:#ffedd5;color:#9a3412}
.mb-empty{background:#fee2e2;color:#991b1b}
.mb-issue{background:#f3e8ff;color:#6b21a8}
.chevron{color:#94a3b8;font-size:12px;transition:transform .2s;flex-shrink:0}
.track-section.closed .chevron{transform:rotate(-90deg)}
.track-body{padding:12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px}
.track-section.closed .track-body{display:none}

/* CARDS */
.card{border-radius:10px;padding:12px 14px;border:1.5px solid;transition:transform .15s,box-shadow .15s;display:flex;flex-direction:column;gap:5px}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.card.confirmed{background:#f0fdf4;border-color:#86efac}
.card.partial{background:#fff7ed;border-color:#fed7aa}
.card.unconfirmed{background:#fff7ed;border-color:#fed7aa}
.card.empty{background:#fef2f2;border-color:#fca5a5}
.card.issue{background:#fffbeb;border-color:#fde68a}
.card.comp{background:#f8fafc;border-color:#e2e8f0}
.card-time{font-size:10px;color:#94a3b8;font-weight:700;font-family:monospace;letter-spacing:.3px}
.card-title{font-size:13px;font-weight:700;color:#0f172a;line-height:1.4}
.card.empty .card-title{color:#dc2626;font-style:italic}
.card.comp .card-title{color:#94a3b8}
.card-speaker{font-size:11px;color:#64748b}
.card-badges{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.badge{font-size:9px;font-weight:800;padding:2px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.3px}
.badge-confirmed{background:#dcfce7;color:#166534;border:1px solid #86efac}
.badge-partial{background:#ffedd5;color:#9a3412;border:1px solid #f97316}
.badge-unconfirmed{background:#ffedd5;color:#9a3412;border:1px solid #fed7aa}
.badge-empty{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
.badge-issue{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
.badge-comp{background:#e0e7ff;color:#3730a3;border:1px solid #c7d2fe}
.badge-dur{background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0}
.flags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.flag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;display:inline-block}
.flag-warn{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}
.flag-danger{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
.flag-purple{background:#f3e8ff;color:#6b21a8;border:1px solid #d8b4fe}
.card-note{font-size:10px;color:#94a3b8;font-style:italic;margin-top:3px}
.conflict-row{grid-column:1/-1;background:#fef2f2;border:2px solid #f87171;border-radius:8px;padding:9px 12px}
.conflict-row strong{color:#dc2626;font-size:12px;display:block;margin-bottom:3px}
.conflict-row p{font-size:11px;color:#7f1d1d}
.track-note{grid-column:1/-1;font-size:11px;color:#94a3b8;font-style:italic;padding:0 2px 6px}

/* LEGEND */
.legend{display:flex;gap:14px;flex-wrap:wrap;padding:10px 24px;background:#fff;border-top:1px solid #e2e8f0;font-size:11px;color:#64748b}
.li{display:flex;align-items:center;gap:5px}
.ld{width:10px;height:10px;border-radius:2px}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#f1f5f9}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
@media(max-width:600px){.header,.content,.filter-bar{padding-left:14px;padding-right:14px}}
</style>
</head>

let currentDay = 'friday';
let currentFilter = 'all';

function setDay(day) {
  currentDay = day;
  document.querySelectorAll('.day-tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0&&day==='friday')||(i===1&&day==='saturday'));
  });
  render();
}

function setFilter(f) {
  currentFilter = f;
  const filters = ['all','confirmed','unconfirmed','empty','issue','comp'];
  document.querySelectorAll('.filter-btn').forEach((b,i) => b.classList.toggle('active', filters[i]===f));
  render();
}

function visible(s) {
  if (currentFilter==='all') return true;
  if (currentFilter==='confirmed') return s.status==='confirmed';
  if (currentFilter==='unconfirmed') return s.status==='unconfirmed';
  if (currentFilter==='empty') return s.status==='empty';
  if (currentFilter==='issue') return s.status==='issue'||(s.flags&&s.flags.length>0&&s.status!=='comp');
  if (currentFilter==='comp') return s.status==='comp';
  return true;
}

function statusLabel(s) {
  return {confirmed:'CONFIRMED',partial:'PARTIALLY CONFIRMED',unconfirmed:'UNCONFIRMED',empty:'AVAILABLE SLOT',comp:'COMPLEMENTARY',issue:'NEEDS ACTION'}[s]||s.toUpperCase();
}

function renderStats(d) {
  let c=0,u=0,e=0,cp=d.comp.length,iss=0;
  d.tracks.forEach(t=>t.sessions.forEach(s=>{
    if(s.status==='confirmed') c++;
    else if(s.status==='unconfirmed') u++;
    else if(s.status==='empty') e++;
    else if(s.status==='comp') cp++;
    if(s.status==='issue'||(s.flags&&s.flags.length>0)) iss++;
  }));
  document.getElementById('statsBar').innerHTML=`
    <div class="stat-chip s-confirmed"><div class="dot"></div>${c} Confirmed</div>
    <div class="stat-chip s-unconfirmed"><div class="dot"></div>${u} Unconfirmed</div>
    <div class="stat-chip s-empty"><div class="dot"></div>${e} Open Slots</div>
    <div class="stat-chip s-comp"><div class="dot"></div>${cp} Complementary</div>
    <div class="stat-chip s-issue"><div class="dot"></div>${iss} Need Action</div>
  `;
}

function render() {
  const d = DATA[currentDay];
  renderStats(d);
  let html = '';

  // Complementary banner
  if (currentFilter==='all'||currentFilter==='comp') {
    html += `<div class="comp-banner"><span class="comp-banner-lbl">☕ Schedule Infrastructure</span>`;
    d.comp.forEach(c => {
      html += `<span class="comp-pill"><span class="ct">${c.time}</span>${c.label}</span>`;
    });
    html += `</div>`;
  }

  d.tracks.forEach(tr => {
    const shown = tr.sessions.filter(visible);
    if (!shown.length && currentFilter!=='all') return;

    const cv = tr.sessions.filter(s=>s.status==='confirmed').length;
    const uv = tr.sessions.filter(s=>s.status==='unconfirmed').length;
    const ev = tr.sessions.filter(s=>s.status==='empty').length;
    const iv = tr.sessions.filter(s=>s.status==='issue'||(s.flags&&s.flags.length>0)).length;

    let badges='';
    if(cv) badges+=`<span class="mb mb-confirmed">${cv} ✓</span>`;
    if(uv) badges+=`<span class="mb mb-unconfirmed">${uv} ⏳</span>`;
    if(ev) badges+=`<span class="mb mb-empty">${ev} ○</span>`;
    if(iv) badges+=`<span class="mb mb-issue">${iv} ⚠</span>`;

    const tid = 'tr-'+tr.name.replace(/\W+/g,'-');
    html += `<div class="track-section" id="${tid}">
      <div class="track-header" onclick="toggle('${tid}')">
        <div class="track-name"><span class="track-icon">${tr.icon}</span>${tr.name}</div>
        <div class="track-meta">${badges}<span class="chevron">▾</span></div>
      </div>
      <div class="track-body">`;

    if(tr.conflict) {
      html += `<div class="conflict-row"><strong>⚠️ SCHEDULE CONFLICT</strong><p>${tr.conflict}</p></div>`;
    }
    if(tr.note) {
      html += `<div class="track-note">ℹ️ ${tr.note}</div>`;
    }

    const sessions = currentFilter==='all' ? tr.sessions : shown;
    sessions.forEach(s => {
      const cls = s.status==='issue'?'issue':s.status;
      const bl = `badge-${s.status==='issue'?'issue':s.status}`;
      let flagsHtml='';
      if(s.flags&&s.flags.length) {
        flagsHtml='<div class="flags">';
        s.flags.forEach(f=>{ flagsHtml+=`<span class="flag flag-${f.t}">${f.t==='danger'?'⛔':f.t==='warn'?'⚠️':'ℹ️'} ${f.l}</span>`; });
        flagsHtml+='</div>';
      }
      html += `<div class="card ${cls}">
        <div class="card-time">${s.time}</div>
        <div class="card-title">${s.title}</div>
        ${s.speaker?`<div class="card-speaker">👤 ${s.speaker}</div>`:''}
        <div class="card-badges">
          <span class="badge ${bl}">${statusLabel(s.status)}</span>
          ${s.dur?`<span class="badge badge-dur">${s.dur}</span>`:''}
        </div>
        ${flagsHtml}
        ${s.note?`<div class="card-note">💡 ${s.note}</div>`:''}
      </div>`;
    });

    html += `</div></div>`;
  });

  document.getElementById('content').innerHTML = html;
}

function toggle(id) {
  document.getElementById(id).classList.toggle('closed');
}

render();
</script>
